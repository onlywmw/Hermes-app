<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>阅读</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'PingFang SC','Noto Sans SC',serif;background:#FEFCE8;color:#1C1917;height:100vh;display:flex;flex-direction:column;}
.header{padding:16px 20px 8px;font-size:16px;font-weight:700;border-bottom:1px solid #FDE68A;}
.content{flex:1;overflow-y:auto;padding:20px;font-size:15px;line-height:2;}
.content p{margin-bottom:16px;text-indent:2em;}
.hint{padding:12px 20px;font-size:11px;color:#A1A1AA;border-top:1px solid #FDE68A;text-align:center;}
</style>
</head>
<body>
<div class="header">阅读器</div>
<div class="content">
  <p>将文本文件放入房间文件目录，点击即可查看。</p>
  <p>支持纯文本和 Markdown 格式。</p>
</div>
<div class="hint">从房间文件 tab 打开文本文件即可阅读</div>
</body>
</html>
