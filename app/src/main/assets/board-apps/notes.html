<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>笔记</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:ui-monospace,'Cascadia Mono',monospace;background:#FFFFFF;color:#09090B;height:100vh;display:flex;flex-direction:column;}
.header{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid #E4E4E7;display:flex;justify-content:space-between;align-items:center;}
.header button{border:1px solid #E4E4E7;border-radius:4px;background:none;padding:4px 12px;font-size:11px;cursor:pointer;}
textarea{flex:1;border:none;outline:none;padding:16px;font-family:inherit;font-size:13px;line-height:1.8;resize:none;}
.status{padding:6px 16px;font-size:10px;color:#A1A1AA;border-top:1px solid #F0F0F2;}
</style>
</head>
<body>
<div class="header"><span>笔记</span><button id="save">保存</button></div>
<textarea id="ed" placeholder="在此输入…"></textarea>
<div class="status" id="st">未保存</div>
<script>
var ed=document.getElementById('ed');
ed.value=localStorage.getItem('mov_notes_draft')||'';
document.getElementById('save').addEventListener('click',function(){
  localStorage.setItem('mov_notes_draft',ed.value);
  document.getElementById('st').textContent='已保存 · '+new Date().toLocaleTimeString();
});
</script>
</body>
</html>
